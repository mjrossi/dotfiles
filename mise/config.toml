redactions = ["*_KEY", "*_TOKEN", "*_SECRET", "*_PASSWORD"]

[tools]
"aqua:anthropics/claude-code" = "latest"
"aqua:astral-sh/uv" = "latest"
"aqua:casey/just" = "latest"
"aqua:charmbracelet/gum" = "latest"
"aqua:cli/cli" = "latest"
"aqua:fullstorydev/grpcurl" = "latest"
"aqua:jqlang/jq" = "latest"
"aqua:koalaman/shellcheck" = "latest"
"aqua:mikefarah/yq" = "latest"
"aqua:neovim/neovim" = "latest"
"aqua:sharkdp/fd" = "latest"
"aqua:zellij-org/zellij" = "latest"
"pipx:httpie" = "latest"
go = { version = "1.26", postinstall = "mise install_go_tools" }
node = "25"
python = "3.14"

[settings]
experimental = true
python.uv_venv_auto = true

[env]
MISE_ENV = "development"
MACOSX_DEPLOYMENT_TARGET = "26.4" # bump after major macOS upgrades (sw_vers -productVersion)

[tasks.install_go_tools]
description = "Install Go Tools Specific to a Version of Go"
run = [
  "go install github.com/go-delve/delve/cmd/dlv@latest",
  "go install golang.org/x/tools/gopls@latest",
]
