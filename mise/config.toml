[tools]
"cargo:bottom" = "latest"
"cargo:fd-find" = "latest"
"cargo:hyperfine" = "latest"
"cargo:nu" = "latest"
"cargo:skim" = "latest"
"cargo:toml-cli" = "latest"
"cargo:zellij" = "latest"
"go:github.com/fullstorydev/grpcurl/cmd/grpcurl" = "v1.9.3"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "v1.30.0"
bun = "1.3.9"
cue = "0.15.4"
elixir = "1.19.5-otp-28"
erlang = "28.3.1"
go = { version = "1.26.0", postinstall = "mise install_go_tools" }
gum = "0.17.0"
java = "26.0.0"
jq = "1.8.1"
just = "1.46.0"
nim = "2.2.6"
node = "25.6.1"
postgres = "16.3"
python = "3.14.3"
ruby = "4.0.1"
rust = "stable"
shellcheck = "stable"
shfmt = "3.12.0"
terraform = "1.14.4"
terraform-docs = "0.21.0"
tflint = "0.61.0"
tree-sitter = "0.26.5"
uv = "0.10.2"
yq = "4.52.2"
zig = "0.15.2"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]

[env]
MISE_ENV = "development"
MACOSX_DEPLOYMENT_TARGET = "{{ exec(command='sw_vers -productVersion') }}"
GITHUB_API_TOKEN = "{{ exec(command='gh auth token') }}"

[tasks.install_go_tools]
description = "Install Go Tools Specific to a Version of Go"
run = [
	"go install github.com/go-delve/delve/cmd/dlv@latest",
	"go install golang.org/x/tools/gopls@latest",
]
