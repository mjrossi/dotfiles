[tools]
"cargo:bottom" = "latest"
"cargo:fd-find" = "latest"
"cargo:hyperfine" = "latest"
"cargo:nu" = "latest"
"cargo:skim" = "latest"
"cargo:toml-cli" = "latest"
"cargo:zellij" = "latest"
"go:github.com/fullstorydev/grpcurl/cmd/grpcurl" = "v1.9.2"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "v1.28.0"
bun = "1.2.2"
cue = "0.12.0"
elixir = "1.18.2-otp-27"
erlang = "27.1.3"
go = { version = "1.24.0", postinstall = "mise install_go_tools" }
gum = "0.13.0"
java = "zulu-23.32.11"
jq = "1.7.1"
just = "1.39.0"
lua = "5.1.5"
nim = "1.6.20"
node = "22.17.0"
postgres = "16.3"
python = "3.11.5"
ruby = "3.4.2"
rust = "stable"
shellcheck = "stable"
shfmt = "3.10.0"
terraform = "1.10.5"
terraform-docs = "0.19.0"
tflint = "0.55.1"
tree-sitter = "0.25.2"
uv = "0.6.1"
yq = "4.45.1"
zig = "0.13.0"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]

[env]
MISE_ENV = "development"
MACOSX_DEPLOYMENT_TARGET = "{{ exec(command='sw_vers -productVersion') }}"

[tasks.install_go_tools]
description = "Install Go Tools Specific to a Version of Go"
run = [
	"go install github.com/go-delve/delve/cmd/dlv@latest",
	"go install golang.org/x/tools/gopls@latest",
]
